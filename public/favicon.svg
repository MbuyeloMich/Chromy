<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="splashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>
  
  <!-- Main organic splash shape -->
  <g filter="url(#dropShadow)">
    <!-- Central blob -->
    <path d="M 100 30 C 115 28 130 35 138 48 C 145 58 143 72 135 82 C 140 78 148 80 152 88 C 158 102 152 118 138 125 C 142 135 138 148 125 155 C 110 162 90 160 78 150 C 70 145 65 135 67 125 C 60 120 55 110 57 98 C 60 82 72 72 85 68 C 78 60 80 47 92 40 C 95 35 98 31 100 30 Z" 
          fill="url(#splashGrad)"/>
    
    <!-- Upper right splash drop -->
    <ellipse cx="155" cy="50" rx="16" ry="18" fill="url(#splashGrad)" opacity="0.85" transform="rotate(-25 155 50)"/>
    
    <!-- Lower left splash drop -->
    <ellipse cx="65" cy="155" rx="14" ry="16" fill="url(#splashGrad)" opacity="0.8" transform="rotate(35 65 155)"/>
    
    <!-- Right side splash -->
    <ellipse cx="145" cy="120" rx="12" ry="14" fill="url(#splashGrad)" opacity="0.75" transform="rotate(-15 145 120)"/>
    
    <!-- Core highlight (light green center) -->
    <circle cx="100" cy="85" r="12" fill="#4ade80" opacity="0.9"/>
    <circle cx="98" cy="82" r="5" fill="#bbf7d0" opacity="0.7"/>
  </g>
</svg>
