<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer splash shape (wave-like) -->
  <path d="M 100 20 C 140 20 170 35 180 60 C 185 75 185 95 175 110 L 170 120 C 165 130 155 135 145 135 C 155 125 160 110 155 95 C 150 75 135 60 110 55 C 130 60 145 75 148 95 C 152 120 140 140 115 145 L 120 155 C 130 152 140 155 145 165 C 150 175 145 185 130 190 C 110 195 85 190 75 175 C 65 160 70 140 85 135 C 75 130 65 125 60 115 C 45 90 50 60 75 40 C 85 30 92 22 100 20 Z" 
        fill="url(#greenGradient)" filter="url(#glow)"/>
  
  <!-- Inner splash accent -->
  <path d="M 100 50 C 125 55 140 70 143 90 C 145 110 135 125 115 130 L 110 138 C 105 130 95 125 85 128 C 75 132 68 142 72 155 C 80 175 100 185 115 180 C 110 170 115 155 125 150 C 130 147 138 150 140 158 C 138 140 128 125 115 120 L 120 110 C 135 105 145 90 142 72 C 140 55 128 42 110 40 C 105 42 103 45 100 50 Z" 
        fill="#86efac" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Core highlight -->
  <circle cx="100" cy="80" r="18" fill="#bbf7d0" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="240" cy="235" rx="15" ry="10" fill="#ffffff" opacity="0.3"/>
  <g stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.25">
    <ellipse cx="256" cy="256" rx="140" ry="135"/>
    <ellipse cx="256" cy="256" rx="165" ry="160" stroke-dasharray="8 12"/>
  </g>
</svg>
